<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weedjai</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" />
  <style>
    /* Custom Icons */
    .icon-tee::before {
      content: '👕';
    }

    .icon-cap::before {
      content: '🧢';
    }

    .icon-tote::before {
      content: '🛍️';
    }

    .icon-hero::before {
      content: '👑';
    }

    /* Hero Month Styling */
    .hero-month {
      background-color: #3b3b3b;
      color: #e5e7eb;
    }

    .hero-month .progress-bar {
      background-color: #fff;
    }

    .core-month {
      background-color: #f3f4f6;
    }

    .core-month .progress-bar {
      background-color: #1f2937;
    }

    /* Modal Styling */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 50;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fff;
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 0.5rem;
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
    }

    .hidden {
      display: none;
    }

    .completed {
      text-decoration: line-through;
    }
  </style>
</head>

<body class="bg-gray-50 font-sans text-gray-800">

  <div class="container mx-auto p-4 md:p-8">

    <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Capsule Delivery Manager</h1>
        <p class="text-sm text-gray-500">Design Team Dashboard.</p>
      </div>
      <div class="mt-4 md:mt-0 text-right">
        <p class="text-sm text-gray-600">Overall Progress:</p>
        <div class="text-4xl font-bold text-gray-900" id="overallProgress">0%</div>
      </div>
    </header>

    <div id="notificationBanner" class="hidden bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 mb-8"
      role="alert">
      <p id="notificationText" class="font-bold"></p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="calendarGrid">
      </div>

    <div id="monthModal" class="modal hidden">
      <div class="modal-content p-6 md:p-8">
        <div class="flex justify-between items-center mb-6">
          <div>
            <h2 id="modalTitle" class="text-2xl font-bold text-gray-900"></h2>
            <p id="modalSubtitle" class="text-sm text-gray-500"></p>
          </div>
          <button class="text-gray-500 hover:text-gray-900" onclick="closeModal()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <div class="mb-6">
          <h3 class="text-lg font-semibold text-gray-800 mb-2">Theme / Notes</h3>
          <textarea id="monthTheme" class="w-full p-3 border border-gray-300 rounded-md" rows="3"
            placeholder="Enter theme, moodboard links, or design notes..."></textarea>
        </div>

        <div class="mb-6">
          <div class="flex justify-between items-center mb-2">
            <h3 class="text-lg font-semibold text-gray-800">Progress</h3>
            <span id="modalProgress" class="text-sm font-medium text-gray-600">0 of 0 complete</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div id="modalProgressBar" class="bg-gray-800 h-2 rounded-full" style="width: 0%"></div>
          </div>
        </div>

        <div class="mb-6">
          <h3 class="text-lg font-semibold text-gray-800 mb-4">Deliverables</h3>
          <div id="deliverablesList" class="space-y-6">
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="frontend-api.js?v=3"></script>
</body>

</html>
